<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Delete Todo</title>
</head>
<body>
    <div class="container">
        <h1>Delete Todo Item</h1>
        <p>Are you sure you want to delete the todo item titled "<strong>{{ todo.title }}</strong>"?</p>
        <form action="{{ url_for('todo.delete_todo', todo_id=todo.id) }}" method="POST">
            <button type="submit">Yes, Delete</button>
            <a href="{{ url_for('todo.index') }}">Cancel</a>
        </form>
    </div>
</body>
</html>
