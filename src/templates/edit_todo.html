<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>Edit Todo</title>
</head>
<body>
    <div class="container">
        <h1>Edit Todo Item</h1>
        <form action="{{ url_for('todo.edit_todo', todo_id=todo.id) }}" method="POST">
            <div class="form-group">
                <label for="title">Title:</label>
                <input type="text" id="title" name="title" value="{{ todo.title }}" required>
            </div>
            <div class="form-group">
                <label for="is_completed">Completed:</label>
                <input type="checkbox" id="is_completed" name="is_completed" {% if todo.is_completed %}checked{% endif %}>
            </div>
            <button type="submit">Update Todo</button>
        </form>
        <a href="{{ url_for('todo.index') }}">Back to Todo List</a>
    </div>
</body>
</html>
