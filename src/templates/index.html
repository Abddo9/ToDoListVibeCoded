<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ToDo List</title>
</head>
<body>
    <div class="container">
        <h1>ToDo List</h1>
        <a href="{{ url_for('todo.add_todo') }}" class="btn">Add New Todo</a>
        <ul>
            {% for todo in todos %}
                <li>
                    <span class="{% if todo.is_completed %}completed{% endif %}">{{ todo.title }}</span>
                    <a href="{{ url_for('todo.edit_todo', todo_id=todo.id) }}" class="btn">Edit</a>
                    <a href="{{ url_for('todo.delete_todo', todo_id=todo.id) }}" class="btn">Delete</a>
                </li>
            {% endfor %}
        </ul>
    </div>
</body>
</html>
