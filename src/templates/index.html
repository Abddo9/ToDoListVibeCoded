<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}">
    <title>ToDo List</title>
    <script crossorigin src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
</head>
<body>
    <div id="root"></div>
    
    <script type="text/babel">
        const { useState, useEffect } = React;

        function TodoApp() {
            const [todos, setTodos] = useState([]);
            const [newTitle, setNewTitle] = useState('');
            const [editingId, setEditingId] = useState(null);
            const [editTitle, setEditTitle] = useState('');
            const [loading, setLoading] = useState(true);
            const [error, setError] = useState(null);

            // Fetch todos on component mount
            useEffect(() => {
                fetchTodos();
            }, []);

            const fetchTodos = async () => {
                try {
                    setLoading(true);
                    const response = await fetch('/api/todos');
                    if (!response.ok) throw new Error('Failed to fetch todos');
                    const data = await response.json();
                    setTodos(data);
                    setError(null);
                } catch (err) {
                    setError('Error loading todos: ' + err.message);
                    console.error(err);
                }
                setLoading(false);
            };

            const addTodo = async (e) => {
                e.preventDefault();
                if (!newTitle.trim()) {
                    setError('Title cannot be empty');
                    return;
                }
                try {
                    const response = await fetch('/api/todos', {
                        method: 'POST',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ title: newTitle })
                    });
                    if (!response.ok) throw new Error('Failed to add todo');
                    const newTodo = await response.json();
                    setTodos([...todos, newTodo]);
                    setNewTitle('');
                    setError(null);
                } catch (err) {
                    setError('Error adding todo: ' + err.message);
                    console.error(err);
                }
            };

            const updateTodo = async (id, title, isCompleted) => {
                try {
                    const response = await fetch(`/api/todos/${id}`, {
                        method: 'PUT',
                        headers: {
                            'Content-Type': 'application/json'
                        },
                        body: JSON.stringify({ title, is_completed: isCompleted })
                    });
                    if (!response.ok) throw new Error('Failed to update todo');
                    const updatedTodo = await response.json();
                    setTodos(todos.map(t => t.id === id ? updatedTodo : t));
                    setEditingId(null);
                    setError(null);
                } catch (err) {
                    setError('Error updating todo: ' + err.message);
                    console.error(err);
                }
            };

            const deleteTodo = async (id) => {
                if (!window.confirm('Are you sure you want to delete this todo?')) return;
                try {
                    const response = await fetch(`/api/todos/${id}`, {
                        method: 'DELETE'
                    });
                    if (!response.ok) throw new Error('Failed to delete todo');
                    setTodos(todos.filter(t => t.id !== id));
                    setError(null);
                } catch (err) {
                    setError('Error deleting todo: ' + err.message);
                    console.error(err);
                }
            };

            const toggleComplete = (todo) => {
                updateTodo(todo.id, todo.title, !todo.is_completed);
            };

            const startEdit = (todo) => {
                setEditingId(todo.id);
                setEditTitle(todo.title);
            };

            const saveEdit = (id) => {
                if (!editTitle.trim()) {
                    setError('Title cannot be empty');
                    return;
                }
                updateTodo(id, editTitle, todos.find(t => t.id === id).is_completed);
            };

            const cancelEdit = () => {
                setEditingId(null);
                setEditTitle('');
            };

            return (
                <div className="container">
                    <div className="todo-container">
                        <h1>📝 My Todo List</h1>
                        
                        {error && <div className="error-message">{error}</div>}
                        
                        <form onSubmit={addTodo} className="add-todo-form">
                            <input
                                type="text"
                                value={newTitle}
                                onChange={(e) => setNewTitle(e.target.value)}
                                placeholder="Add a new todo..."
                                className="todo-input"
                            />
                            <button type="submit" className="btn btn-add">Add Todo</button>
                        </form>

                        {loading ? (
                            <p className="loading">Loading todos...</p>
                        ) : todos.length === 0 ? (
                            <p className="empty-message">No todos yet. Add one to get started! 🚀</p>
                        ) : (
                            <ul className="todo-list">
                                {todos.map(todo => (
                                    <li key={todo.id} className={`todo-item ${todo.is_completed ? 'completed' : ''}`}>
                                        <div className="todo-content">
                                            <input
                                                type="checkbox"
                                                checked={todo.is_completed}
                                                onChange={() => toggleComplete(todo)}
                                                className="todo-checkbox"
                                            />
                                            {editingId === todo.id ? (
                                                <input
                                                    type="text"
                                                    value={editTitle}
                                                    onChange={(e) => setEditTitle(e.target.value)}
                                                    className="todo-edit-input"
                                                    autoFocus
                                                />
                                            ) : (
                                                <span className="todo-title">{todo.title}</span>
                                            )}
                                        </div>
                                        <div className="todo-actions">
                                            {editingId === todo.id ? (
                                                <>
                                                    <button
                                                        onClick={() => saveEdit(todo.id)}
                                                        className="btn btn-save"
                                                    >
                                                        Save
                                                    </button>
                                                    <button
                                                        onClick={cancelEdit}
                                                        className="btn btn-cancel"
                                                    >
                                                        Cancel
                                                    </button>
                                                </>
                                            ) : (
                                                <>
                                                    <button
                                                        onClick={() => startEdit(todo)}
                                                        className="btn btn-edit"
                                                    >
                                                        Edit
                                                    </button>
                                                    <button
                                                        onClick={() => deleteTodo(todo.id)}
                                                        className="btn btn-delete"
                                                    >
                                                        Delete
                                                    </button>
                                                </>
                                            )}
                                        </div>
                                    </li>
                                ))}
                            </ul>
                        )}
                    </div>
                </div>
            );
        }

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<TodoApp />);
    </script>
</body>
</html>
